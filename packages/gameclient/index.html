<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>Demo</title>
    <link rel="stylesheet" href="style.css">
    <script src="src/index.js" type="module"></script>
</head>

<body>
    <div id="main-column">
        <div id="game-container" class="container">
            <div id="canvas-container" class="container">
                <canvas id="canvas-2d" width="900" height="720" tabindex="0"></canvas>
                <div id="ui"></div>
            </div>
            <div id="chatbox-container" class="container">
                <div id="chatbox">
                    <div id="chatbox-content"></div>
                    <input type="text" id="chatbox-input">
                </div>
            </div>
        </div>
        <div id="chat-container" class="container">
            <textarea id="chat-input" placeholder="Press enter to start chatting..."></textarea>
        </div>
    </div>
</body>

</html>
